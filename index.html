<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Faculty Roulette 是一个带有学术怪谈叙事的高校生存小游戏。">
  <title>青椒轮盘 | Faculty Roulette</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <section class="hero" aria-labelledby="title">
      <div class="hero-copy">
        <p class="eyebrow">Faculty Roulette</p>
        <h1 id="title">青椒轮盘</h1>
        <p class="lead">每一局都不是同一条命运线。你会遇到不同的场景、做出不同的决定，然后看学院如何把这些决定慢慢写成一则完整的怪谈。</p>
        <div class="hero-actions">
          <button id="startHeroBtn" class="primary">开始这一轮</button>
          <button id="seedBtn" class="ghost">换一组宇宙</button>
        </div>
      </div>

      <section class="roulette-card" aria-label="faculty roulette wheel">
        <div class="wheel-wrap">
          <div class="wheel" id="wheel">
            <span style="--i:0">Paper</span>
            <span style="--i:1">Grant</span>
            <span style="--i:2">Class</span>
            <span style="--i:3">Service</span>
            <span style="--i:4">Health</span>
            <span style="--i:5">Reviewer</span>
          </div>
          <div class="needle" aria-hidden="true"></div>
        </div>
      </section>
    </section>

    <section class="game-shell">
      <aside class="panel control-panel">
        <div class="panel-title">
          <span class="panel-icon">ID</span>
          <h2>角色档案</h2>
        </div>

        <label for="profile">开局风格</label>
        <select id="profile">
          <option value="balanced">均衡型青椒</option>
          <option value="paper">论文冲刺型</option>
          <option value="grant">基金焦虑型</option>
          <option value="teaching">教学口碑型</option>
          <option value="stealth">低调潜行型</option>
        </select>

        <label for="mode">宇宙强度</label>
        <select id="mode">
          <option value="standard">标准学术天气</option>
          <option value="publish">非升即走模式</option>
          <option value="humane">理想学院模式</option>
        </select>

        <div class="profile-note" id="profileNote"></div>

        <button id="startBtn" class="primary">新开一局</button>
        <button id="restartBtn" class="ghost">重开</button>
        <button id="dailySeedBtn" class="ghost">今日宇宙</button>

        <div class="mini-board" aria-label="current identity">
          <div>
            <span>头衔</span>
            <strong id="rank">未入职</strong>
          </div>
          <div>
            <span>宇宙编号</span>
            <strong id="seedLabel">FR-000</strong>
          </div>
          <div>
            <span>危机雷达</span>
            <strong id="crisis">--</strong>
          </div>
        </div>
      </aside>

      <section class="panel board" aria-live="polite">
        <article class="event-card event-card-story" id="eventCard">
          <div class="event-meta">
            <span id="eventTag">事件卡</span>
            <span id="eventRisk">risk: --</span>
          </div>
          <h2 id="eventTitle">尚未抽卡</h2>
          <p id="eventText">选择开局风格，然后开始你的学术怪谈历程。</p>
          <div id="choices" class="choices"></div>
        </article>

        <section class="story-panel" aria-label="story timeline">
          <div class="section-head story-section-head">
            <strong>完整历程</strong>
          </div>
          <ol id="timeline" class="timeline"></ol>
        </section>

      </section>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
